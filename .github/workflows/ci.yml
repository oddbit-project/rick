name: CI

on:
  push:
    branches: [ master, development ]
  pull_request:
    branches: [ master, development ]

permissions:
  contents: read

jobs:
  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11", "3.12", "3.13", "3.14" ]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install . -r requirements-dev.txt
      - name: Run tests (Redis integration excluded)
        run: python -m pytest --ignore=tests/resource/redis

  integration:
    name: Redis integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install . -r requirements-dev.txt
      - name: Run Redis backend tests (testcontainers / Docker)
        run: python -m pytest tests/resource/redis

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install lint tools
        run: pip install flake8 black
      - name: flake8 (real errors)
        run: flake8 --select=E9,F63,F7,F82,F811 rick
      - name: black --check (advisory)
        continue-on-error: true
        run: black --check --diff rick

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build

  security:
    name: Vulnerability + SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e . pip-audit bandit
      - name: pip-audit (dependency CVEs)
        # editable self-install is skipped; dependencies are still audited and
        # the step fails on any known CVE.
        # Ignore GHSA-4xh5-x5gv-qwph: pip tarfile extraction vulnerability in pip
        # itself (the build tool), not a runtime dependency.
        run: pip-audit --skip-editable --desc --ignore-vuln GHSA-4xh5-x5gv-qwph
      - name: bandit (SAST)
        run: bandit -r rick -ll

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [ test, integration, lint, build, security ]
    if: always()
    steps:
      - name: Verify all jobs passed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "One or more required jobs failed."
          exit 1
      - name: Success
        run: echo "All CI jobs passed."
